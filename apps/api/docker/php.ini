file_uploads = On
upload_max_filesize = 50M
post_max_size = 60M
max_file_uploads = 20
upload_tmp_dir = /tmp
sys_temp_dir = /tmp
memory_limit = 256M
max_execution_time = 120
max_input_time = 120

; Ensure file uploads use writable temp directory
; PHP configuration loaded by Dockerfile as /usr/local/etc/php/conf.d/custom.ini
