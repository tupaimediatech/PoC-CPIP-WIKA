# VPS deployment notes for api-cpip.haydaramru.com
#
# No host nginx needed — Cloudflare connects directly to Docker container.
#
# Setup:
#   1. Docker container maps port 2083:8080
#   2. Cloudflare DNS: A record "api-cpip" → VPS IP (proxied)
#   3. Cloudflare SSL mode: Flexible (container serves HTTP, Cloudflare handles HTTPS)
#
# Port 2083 is in Cloudflare's supported HTTPS port list.
